<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Конструктор питания</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

<style>
@font-face {
  font-family: 'TildaSans';
  src: url('https://static.tildacdn.com/tild3463-3334-4366-b366-313431346462/TildaSans-Regular.woff2') format('woff2');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'TildaSans';
  src: url('https://static.tildacdn.com/tild3138-3539-4233-a637-356430623933/TildaSans-Medium.woff2') format('woff2');
  font-weight: 500;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'TildaSans';
  src: url('https://static.tildacdn.com/tild3636-3936-4438-b239-396639383665/TildaSans-Semibold.woff2') format('woff2');
  font-weight: 600;
  font-style: normal;
  font-display: swap;
}

:root {
  --bg: #F3F2EB;
  --card: #FFFDF9;
  --text: #1F261F;
  --text-muted: #6B7268;
  --text-faint: #A8AC9F;
  --heading: #244A25;
  --accent: #009DB0;
  --line: #E5E2D5;
  --line-soft: #EDEAE0;
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'TildaSans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
  overscroll-behavior-y: none;
}

button { font-family: inherit; }
input { font-family: inherit; }

/* ---------- HEADER ---------- */
.header {
  padding: 20px 18px 14px;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(6px);
}
.header-eyebrow {
  font-size: 10px; letter-spacing: 3px;
  color: var(--heading); text-transform: uppercase;
  font-weight: 600; margin-bottom: 4px;
}
.header-title {
  font-family: var(--serif);
  font-size: 26px; font-weight: 600;
  color: var(--heading); line-height: 1.1;
  letter-spacing: -0.5px;
}
.view-tabs {
  display: flex; gap: 6px; margin-top: 14px;
}
.view-tab {
  border: 1px solid var(--line);
  background: transparent;
  color: var(--text-muted);
  border-radius: 100px;
  padding: 7px 16px;
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  transition: all 0.18s ease;
}
.view-tab.active {
  background: var(--heading);
  color: var(--card);
  border-color: var(--heading);
}

/* ---------- CONTAINER ---------- */
.container { padding: 16px; max-width: 760px; margin: 0 auto; }

/* ---------- DAY TABS ---------- */
.day-tabs {
  display: flex; gap: 6px;
  overflow-x: auto; padding-bottom: 6px;
  margin: -2px -16px 14px; padding-left: 16px; padding-right: 16px;
  scrollbar-width: none;
}
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  flex-shrink: 0;
  min-width: 56px;
  border: 1px solid var(--line);
  background: var(--card);
  border-radius: 14px;
  padding: 9px 4px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s ease;
}
.day-tab.has-items { border-color: #C9D6BB; }
.day-tab.active {
  background: var(--heading);
  border-color: var(--heading);
}
.day-tab .day-name {
  font-size: 13px; font-weight: 600; color: var(--text);
  font-family: var(--sans);
}
.day-tab.active .day-name { color: var(--card); }
.day-tab .day-kcal {
  font-size: 10px; margin-top: 3px;
  color: var(--heading);
  font-variant-numeric: tabular-nums;
}
.day-tab.active .day-kcal { color: rgba(255,253,249,0.75); }

/* ---------- CARDS ---------- */
.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 14px;
}
.card-label {
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--heading);
  font-weight: 600;
  margin-bottom: 10px;
}

/* ---------- KBJU BAR ---------- */
.kbju {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.kbju-item {
  background: var(--bg);
  border-radius: 10px;
  padding: 8px 6px;
  text-align: center;
  border: 1px solid transparent;
}
.kbju-item.compact { padding: 6px 4px; }
.kbju-label {
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 600;
  margin-bottom: 2px;
}
.kbju-value {
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 600;
  color: var(--heading);
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.kbju-item.compact .kbju-value { font-size: 13px; }

/* ---------- MEAL TABS ---------- */
.meal-tabs {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 14px;
}
.meal-tab {
  border: 1px solid var(--line);
  background: var(--card);
  border-radius: 14px;
  padding: 9px 4px;
  cursor: pointer;
  transition: all 0.15s ease;
  text-align: center;
}
.meal-tab.has-items { border-color: #C9D6BB; }
.meal-tab.active {
  border-color: var(--heading);
  background: #ECEFE2;
}
.meal-tab .meal-emoji { font-size: 18px; line-height: 1; }
.meal-tab .meal-name {
  font-size: 11px;
  margin-top: 4px;
  color: var(--text);
  font-weight: 500;
}
.meal-tab.active .meal-name { color: var(--heading); font-weight: 600; }
.meal-tab .meal-kcal {
  font-size: 10px;
  margin-top: 2px;
  color: var(--heading);
  font-variant-numeric: tabular-nums;
}

/* ---------- SELECTED ITEMS ---------- */
.selected-items .selected-item {
  padding: 12px 0;
  border-bottom: 1px solid var(--line-soft);
}
.selected-items .selected-item:last-child { border-bottom: none; padding-bottom: 4px; }
.selected-item-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 8px;
}
.selected-item-name {
  font-family: var(--serif);
  font-size: 16px;
  color: var(--text);
  line-height: 1.3;
  font-weight: 500;
  padding-right: 8px;
}
.remove-btn {
  background: transparent; border: none;
  color: var(--text-faint); cursor: pointer;
  font-size: 18px; padding: 0; line-height: 1;
  width: 24px; height: 24px;
  flex-shrink: 0;
  transition: color 0.15s ease;
}
.remove-btn:hover { color: var(--text); }

.grams-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.grams-btn {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 1px solid var(--line);
  background: var(--bg);
  color: var(--text);
  font-size: 17px;
  cursor: pointer;
  line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.12s ease;
}
.grams-btn:active { background: var(--heading); color: var(--card); border-color: var(--heading); }
.grams-input {
  width: 64px; height: 30px;
  text-align: center;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  font-variant-numeric: tabular-nums;
  font-weight: 500;
  -moz-appearance: textfield;
}
.grams-input::-webkit-outer-spin-button,
.grams-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.grams-input:focus { outline: none; border-color: var(--heading); }
.grams-unit { color: var(--text-muted); font-size: 13px; }

.meal-total-row {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px dashed var(--line);
}
.meal-total-label {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 8px;
  font-weight: 600;
}

/* ---------- CATEGORY PILLS ---------- */
.category-pills {
  display: flex; gap: 6px;
  overflow-x: auto;
  padding-bottom: 8px;
  margin: 6px -16px 12px;
  padding-left: 16px; padding-right: 16px;
  scrollbar-width: none;
}
.category-pills::-webkit-scrollbar { display: none; }
.category-pill {
  flex-shrink: 0;
  border: 1px solid var(--line);
  background: var(--card);
  border-radius: 100px;
  padding: 7px 14px;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s ease;
  font-weight: 500;
}
.category-pill.active {
  background: var(--heading);
  color: var(--card);
  border-color: var(--heading);
}

/* ---------- PRODUCT GRID ---------- */
.product-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
@media (min-width: 540px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
.product-btn {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 12px 12px 10px;
  text-align: left;
  cursor: pointer;
  transition: all 0.15s ease;
  position: relative;
}
.product-btn:hover { border-color: #C9D6BB; }
.product-btn.selected {
  background: #ECEFE2;
  border-color: var(--heading);
}
.product-btn .check {
  display: none;
  position: absolute; top: 8px; right: 8px;
  width: 18px; height: 18px;
  background: var(--heading); color: var(--card);
  border-radius: 50%;
  align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
}
.product-btn.selected .check { display: flex; }
.product-name {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 6px;
  padding-right: 22px;
}
.product-meta {
  font-size: 11px;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.3px;
}
.product-btn.selected .product-meta { color: var(--heading); }
.product-hint {
  font-size: 10px;
  color: var(--accent);
  margin-top: 3px;
  font-style: italic;
  letter-spacing: 0.2px;
}

/* ---------- DRINKS SECTION ---------- */
.drinks-card { margin-top: 4px; }
.drinks-card .card-label { color: var(--accent); }
.drink-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 0;
  border-bottom: 1px solid var(--line-soft);
  gap: 8px;
}
.drink-row:last-child { border-bottom: none; }
.drink-name {
  font-family: var(--serif);
  font-size: 15px;
  color: var(--text);
  font-weight: 500;
  flex: 1;
  min-width: 0;
}
.drink-name .sub {
  display: block;
  font-family: var(--sans);
  font-size: 10px;
  color: var(--text-muted);
  font-style: italic;
  margin-top: 2px;
  font-weight: 400;
  letter-spacing: 0.2px;
}
.water-counter {
  display: flex; align-items: center; gap: 6px;
  background: rgba(0, 157, 176, 0.08);
  border: 1px solid rgba(0, 157, 176, 0.25);
  border-radius: 100px;
  padding: 4px 6px;
  flex-shrink: 0;
}
.water-counter .grams-btn {
  width: 32px; height: 32px;
  border: 1px solid var(--accent);
  background: white;
  color: var(--accent);
  font-size: 18px;
  font-weight: 600;
}
.water-counter .grams-btn:active { background: var(--accent); color: white; }
.water-value {
  font-family: var(--serif);
  font-size: 19px;
  font-weight: 700;
  color: var(--accent);
  min-width: 28px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}
.water-unit { font-size: 11px; color: var(--text-muted); padding-right: 4px; }

/* DAY RESET BUTTON */
.day-total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.day-reset-btn {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--text-muted);
  border-radius: 8px;
  padding: 4px 10px;
  font-size: 11px;
  cursor: pointer;
  font-family: var(--sans);
  transition: all 0.15s ease;
}
.day-reset-btn:hover {
  color: var(--text);
  border-color: var(--text-muted);
  background: var(--bg);
}

/* ---------- WEEK VIEW ---------- */
.week-day {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 16px;
  margin-bottom: 14px;
  overflow: hidden;
}
.week-day-head {
  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #F8F6EC;
  border-bottom: 1px solid var(--line-soft);
}
.week-day-name {
  font-family: var(--serif);
  font-size: 19px;
  font-weight: 600;
  color: var(--heading);
}
.week-day-kcal {
  font-size: 12px;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}
.edit-btn {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--text);
  border-radius: 8px;
  padding: 5px 12px;
  font-size: 11px;
  cursor: pointer;
  margin-left: 8px;
  transition: all 0.12s ease;
}
.edit-btn:hover { background: var(--bg); }
.week-day-empty {
  padding: 14px 16px;
  font-size: 13px;
  color: var(--text-faint);
  font-style: italic;
}
.week-meal {
  padding: 12px 16px;
  border-top: 1px solid var(--line-soft);
}
.week-meal-head {
  font-size: 12px;
  color: var(--heading);
  margin-bottom: 8px;
  font-weight: 600;
}
.week-meal-head .kcal { color: var(--text-muted); font-weight: 500; }
.week-meal-items {
  display: flex; flex-wrap: wrap; gap: 5px;
  margin-bottom: 10px;
}
.week-meal-chip {
  background: var(--bg);
  border: 1px solid var(--line-soft);
  border-radius: 100px;
  padding: 4px 10px;
  font-size: 12px;
  color: var(--text);
}
.week-meal-chip .gram { color: var(--text-muted); margin-left: 3px; }
.week-day-total {
  padding: 12px 16px;
  background: #F8F6EC;
  border-top: 1px solid var(--line-soft);
}

/* ---------- ACTIONS ---------- */
.actions-bar {
  display: flex; gap: 10px;
  margin: 18px 0 30px;
  flex-wrap: wrap;
}
.action-btn {
  flex: 1;
  min-width: 140px;
  background: var(--heading);
  color: var(--card);
  border: none;
  border-radius: 14px;
  padding: 14px 18px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
  letter-spacing: 0.3px;
  font-family: var(--sans);
}
.action-btn:hover { background: #1A3A1B; }
.action-btn.primary {
  background: var(--accent);
}
.action-btn.primary:hover { background: #007E8E; }
.action-btn.secondary {
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--line);
}
.action-btn.secondary:hover { background: var(--bg); border-color: var(--text-muted); }

.empty-state {
  padding: 30px 20px;
  text-align: center;
  color: var(--text-faint);
  font-size: 13px;
  font-style: italic;
}

.divider {
  height: 1px; background: var(--line);
  margin: 24px 0 16px;
}

.hint {
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
  margin: 12px 0 4px;
  line-height: 1.5;
}

/* PRINCIPLE NOTE */
.principle {
  background: var(--card);
  border: 1px solid var(--line);
  border-left: 3px solid var(--accent);
  border-radius: 12px;
  padding: 11px 14px;
  margin-bottom: 14px;
  font-size: 13px;
  color: var(--text);
  line-height: 1.45;
}
.principle b { color: var(--heading); font-weight: 600; }

/* PRINT-ONLY SECTION (becomes visible on print) */
#printSection { display: none; }

@media print {
  html, body {
    background: #FFFFFF !important;
    margin: 0 !important;
    padding: 0 !important;
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
  body > *:not(#printSection) { display: none !important; }
  #printSection {
    display: block !important;
    background: #F3F2EB;
    color: #1F261F;
    font-family: 'TildaSans', -apple-system, sans-serif;
  }
  @page { size: A4; margin: 10mm 10mm 12mm; }
  .pdf-day { page-break-inside: avoid; }
  .pdf-header { page-break-after: avoid; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">Akulova · Wellness</div>
  <h1 class="header-title">Конструктор питания</h1>
  <div class="view-tabs">
    <button class="view-tab active" data-view="constructor">Конструктор</button>
    <button class="view-tab" data-view="week">Вся неделя</button>
    <button class="view-tab" id="resetBtn" style="margin-left:auto">Сбросить</button>
  </div>
</div>

<div class="container">

  <!-- CONSTRUCTOR VIEW -->
  <div id="constructorView">

    <div class="principle">
      <b>Принцип:</b> каждый приём пищи = белок + овощи + немного углеводов или жиров.
    </div>

    <div class="day-tabs" id="dayTabs"></div>

    <div class="card" id="dayTotalCard" style="display:none">
      <div class="day-total-row">
        <div class="card-label" style="margin:0">День: итого</div>
        <button class="day-reset-btn" id="dayResetBtn">Очистить день</button>
      </div>
      <div class="kbju" id="dayTotalKbju"></div>
    </div>

    <div class="card drinks-card">
      <div class="card-label">Напитки за день</div>
      <div id="drinksList"></div>
    </div>

    <div class="meal-tabs" id="mealTabs"></div>

    <div class="card" id="selectedCard" style="display:none">
      <div class="card-label" id="selectedLabel"></div>
      <div class="selected-items" id="selectedItems"></div>
      <div class="meal-total-row">
        <div class="meal-total-label">Приём: итого</div>
        <div class="kbju" id="mealTotalKbju"></div>
      </div>
    </div>

    <div class="hint" id="addHint">Выбери категорию и тапни продукт чтобы добавить</div>

    <div class="category-pills" id="categoryPills"></div>
    <div class="product-grid" id="productGrid"></div>
  </div>

  <!-- WEEK VIEW -->
  <div id="weekView" style="display:none">
    <div class="card">
      <div class="card-label">Неделя: итого</div>
      <div class="kbju" id="weekTotalKbju"></div>
    </div>
    <div id="weekDays"></div>
  </div>

  <div class="actions-bar">
    <button class="action-btn primary" id="downloadPdfBtn">Скачать PDF</button>
    <button class="action-btn secondary" id="goToWeekBtn">Посмотреть неделю</button>
  </div>

</div>

<!-- Print-only section (filled in on PDF download) -->
<div id="printSection"></div>

function defaultPlan() {
  const p = {};
  days.forEach(d => {
    p[d] = { _drinks: defaultDrinks() };
    meals.forEach(m => p[d][m] = []);
  });
  return p;
}
function loadPlan() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return defaultPlan();
    const parsed = JSON.parse(saved);
    days.forEach(d => {
      if (!parsed[d]) parsed[d] = {};
      meals.forEach(m => { if (!Array.isArray(parsed[d][m])) parsed[d][m] = []; });
      if (!parsed[d]._drinks) parsed[d]._drinks = defaultDrinks();
    });
    return parsed;
  } catch (e) { return defaultPlan(); }
}
function savePlan() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(plan)); } catch (e) {}
}

// ============== HELPERS ==============
const fmt = n => Math.round(n);
const fmt1 = n => (Math.round(n * 10) / 10).toString();

function calc(name, grams) {
  const db = productDB[name];
  if (!db) return { k:0, b:0, zh:0, u:0 };
  const r = grams / 100;
  return { k: db.k*r, b: db.b*r, zh: db.zh*r, u: db.u*r };
}
function sumKbju(items) {
  return items.reduce((acc, it) => {
    const v = calc(it.name, it.grams);
    return { k: acc.k+v.k, b: acc.b+v.b, zh: acc.zh+v.zh, u: acc.u+v.u };
  }, { k:0, b:0, zh:0, u:0 });
}
function mealTotal(d, m) { return sumKbju(plan[d][m]); }
function dayTotal(d) { return sumKbju(meals.flatMap(m => plan[d][m])); }
function weekTotal() { return sumKbju(days.flatMap(d => meals.flatMap(m => plan[d][m]))); }
function hasDayItems(d) { return meals.some(m => plan[d][m].length > 0); }
function hasMealItems(d, m) { return plan[d][m].length > 0; }

function kbjuHTML(t, compact) {
  const cls = compact ? "kbju-item compact" : "kbju-item";
  return `
    <div class="${cls}"><div class="kbju-label">ккал</div><div class="kbju-value">${fmt(t.k)}</div></div>
    <div class="${cls}"><div class="kbju-label">Белки</div><div class="kbju-value">${fmt(t.b)}</div></div>
    <div class="${cls}"><div class="kbju-label">Жиры</div><div class="kbju-value">${fmt(t.zh)}</div></div>
    <div class="${cls}"><div class="kbju-label">Углев</div><div class="kbju-value">${fmt(t.u)}</div></div>
  `;
}

function renderDayTabs() {
  const root = document.getElementById("dayTabs");
  root.innerHTML = days.map(d => {

    return `
      <button class="day-tab ${activeDay===d?'active':''} ${has?'has-items':''}" data-day="${d}">
        <div class="day-name">${d}</div>
        ${has ? `<div class="day-kcal">${fmt(t.k)} ккал</div>` : ''}
      </button>
    `;
  }).join("");
  root.querySelectorAll("[data-day]").forEach(el => {
    el.addEventListener("click", () => { activeDay = el.dataset.day; renderConstructor(); });
  });
}

function renderMealTabs() {
  const root = document.getElementById("mealTabs");
  root.innerHTML = meals.map(m => {
    const t = mealTotal(activeDay, m);
    const has = hasMealItems(activeDay, m);
    return `
      <button class="meal-tab ${activeMeal===m?'active':''} ${has?'has-items':''}" data-meal="${m}">
        <div class="meal-emoji">${mealEmoji[m]}</div>
        <div class="meal-name">${m}</div>
        ${has ? `<div class="meal-kcal">${fmt(t.k)} ккал</div>` : ''}

}

function renderDayTotal() {
  const card = document.getElementById("dayTotalCard");
  if (!hasDayItems(activeDay)) { card.style.display = "none"; return; }
  card.style.display = "";
  document.getElementById("dayTotalKbju").innerHTML = kbjuHTML(dayTotal(activeDay), false);
}

function renderSelected() {
  const items = plan[activeDay][activeMeal];
  const card = document.getElementById("selectedCard");
  const hint = document.getElementById("addHint");
  if (!items.length) {
    card.style.display = "none";
    hint.style.display = "";
    hint.textContent = `${activeDay} · ${activeMeal} — пусто. Выбери продукты ниже.`;
    return;
  }
  card.style.display = "";
  hint.style.display = "none";
  document.getElementById("selectedLabel").textContent = `${dayFull[activeDay]} · ${activeMeal}`;

  document.getElementById("selectedItems").innerHTML = items.map((it, idx) => {
    const k = calc(it.name, it.grams);
    return `
      <div class="selected-item">
        <div class="selected-item-head">
          <div class="selected-item-name">${it.name}</div>
          <button class="remove-btn" data-remove="${idx}" aria-label="Удалить">×</button>
        </div>
        <div class="grams-row">
          <button class="grams-btn" data-step="-10" data-idx="${idx}">−</button>
          <input class="grams-input" type="number" min="1" value="${it.grams}" data-idx="${idx}" />
          <button class="grams-btn" data-step="10" data-idx="${idx}">+</button>
          <span class="grams-unit">г</span>
        </div>
        <div class="kbju">${kbjuHTML(k, true)}</div>
      </div>
    `;
  }).join("");
  document.getElementById("mealTotalKbju").innerHTML = kbjuHTML(mealTotal(activeDay, activeMeal), false);

  document.querySelectorAll("[data-remove]").forEach(b => {
    b.addEventListener("click", () => {
      const i = +b.dataset.remove;
      plan[activeDay][activeMeal].splice(i,1);
      savePlan(); renderConstructor();
    });
  });
  document.querySelectorAll(".grams-btn[data-step]").forEach(b => {
    b.addEventListener("click", () => {
      const i = +b.dataset.idx;
      const step = +b.dataset.step;
      plan[activeDay][activeMeal][i].grams = Math.max(1, plan[activeDay][activeMeal][i].grams + step);
      savePlan(); renderSelected(); renderDayTotal(); renderDayTabs(); renderMealTabs();
    });
  });
  document.querySelectorAll(".grams-input").forEach(inp => {
    inp.addEventListener("input", () => {
      const i = +inp.dataset.idx;
      const v = Math.max(1, parseInt(inp.value) || 1);
      plan[activeDay][activeMeal][i].grams = v;
      savePlan();
      // recompute KBJU lines without re-rendering input (don't lose focus)
      renderDayTotal(); renderDayTabs(); renderMealTabs();
      // Update only the kbju + meal total for this row
      const row = inp.closest(".selected-item");
      if (row) {
        const k = calc(plan[activeDay][activeMeal][i].name, v);
        row.querySelector(".kbju").innerHTML = kbjuHTML(k, true);
      }
      document.getElementById("mealTotalKbju").innerHTML = kbjuHTML(mealTotal(activeDay, activeMeal), false);
    });
  });
}

function drinksSummary(d) {
  const parts = [];
  if (d.water > 0) parts.push(`Вода ${d.water} ст (~${(d.water * 0.25).toFixed(1)} л)`);
  if (d.greenTea > 0) parts.push(`Зелёный чай ${d.greenTea} чш`);
  if (d.coffee > 0) parts.push(`Кофе ${d.coffee} чш`);
  if (d.gingerTea > 0) parts.push(`Имбирный чай ${d.gingerTea} чш`);
  return parts.join(" · ");
}

function switchView(v) {
  view = v;
  document.querySelectorAll(".view-tab[data-view]").forEach(el => {
    el.classList.toggle("active", el.dataset.view === v);
  });
  document.getElementById("constructorView").style.display = v === "constructor" ? "" : "none";
  document.getElementById("weekView").style.display = v === "week" ? "" : "none";
  if (v === "constructor") renderConstructor();
  else renderWeek();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ============== PDF EXPORT (pdfmake, lazy-loaded) ==============
let pdfMakeReady = false;

function loadScript(url) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = url;
    s.onload = () => resolve();
    s.onerror = () => reject(new Error('Не удалось загрузить ' + url));
    document.head.appendChild(s);
  });
}

async function ensurePdfMake() {
  if (pdfMakeReady && window.pdfMake && window.pdfMake.vfs) return;
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/pdfmake.min.js');
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/vfs_fonts.js');
  if (!window.pdfMake) throw new Error('pdfmake не загрузилcя');
  pdfMakeReady = true;
}

function buildPdfDef() {
  const wt = weekTotal();
  const today = new Date();
  const dateStr = today.toLocaleDateString("ru-RU", { day: 'numeric', month: 'long', year: 'numeric' });

  const COL_HEAD = '#244A25';
  const COL_BODY = '#1F261F';
  const COL_MUTED = '#6B7268';
  const COL_ACCENT = '#009DB0';

  // Build day blocks
  const dayBlocks = [];
  days.forEach((d, idx) => {
    const t = dayTotal(d);
    const any = hasDayItems(d);
    const drinks = (plan[d] && plan[d]._drinks) || defaultDrinks();
    const drinksLine = drinksSummary(drinks);

    if (!any && !drinksLine) {
      dayBlocks.push({
        unbreakable: true,
        stack: [
          {
            columns: [
              { text: dayFull[d], color: COL_HEAD, fontSize: 14, bold: true, width: '*' },
              { text: 'не заполнено', color: '#A8AC9F', italics: true, fontSize: 10, alignment: 'right', width: 'auto' }
            ]
          },
          { canvas: [{ type: 'line', x1: 0, y1: 4, x2: 515, y2: 4, lineWidth: 0.5, lineColor: '#E5E2D5' }] }
        ],
        margin: [0, 4, 0, 8]
      });
      return;
    }

    const stack = [
      {
        columns: [
          { text: dayFull[d], color: COL_HEAD, fontSize: 14, bold: true, width: '*' },
          { text: any ? `${fmt(t.k)} ккал · Б ${fmt(t.b)} · Ж ${fmt(t.zh)} · У ${fmt(t.u)}` : '', color: COL_MUTED, fontSize: 10, alignment: 'right', width: 'auto', margin: [0, 3, 0, 0] }
        ]
      },
      { canvas: [{ type: 'line', x1: 0, y1: 4, x2: 515, y2: 4, lineWidth: 0.5, lineColor: '#E5E2D5' }], margin: [0, 0, 0, 4] }
    ];

    meals.forEach(m => {
      const items = plan[d][m];
      if (!items.length) return;
      const mt = mealTotal(d, m);
      stack.push({
        text: `${m.toUpperCase()}  ·  ${fmt(mt.k)} ккал · Б ${fmt(mt.b)} · Ж ${fmt(mt.zh)} · У ${fmt(mt.u)}`,
        color: COL_HEAD, fontSize: 9, bold: true, margin: [0, 4, 0, 2], characterSpacing: 0.5
      });
      stack.push({
        text: items.map(it => `${it.name} — ${it.grams}г`).join('  ·  '),
        color: COL_BODY, fontSize: 10, lineHeight: 1.35
      });
    });

    if (drinksLine) {
      stack.push({
        text: 'НАПИТКИ',
        color: COL_ACCENT, fontSize: 9, bold: true, margin: [0, 4, 0, 2], characterSpacing: 0.5
      });
      stack.push({
        text: drinksLine,
        color: COL_BODY, fontSize: 10, lineHeight: 1.35
      });
    }

    dayBlocks.push({
      unbreakable: true,
      stack: stack,
      margin: [0, 6, 0, 10]
    });
  });

  return {
    pageSize: 'A4',
    pageMargins: [40, 40, 40, 40],
    defaultStyle: {
      font: 'Roboto',
      fontSize: 10,
      color: COL_BODY,
      lineHeight: 1.3
    },
    info: {
      title: 'План питания на неделю',
      creator: 'Akulova Wellness'
    },
    content: [
      // Header
      {
        text: 'План питания на неделю',
        fontSize: 22,
        bold: true,
        color: COL_HEAD,
        alignment: 'center',
        margin: [0, 0, 0, 4]
      },
      {
        text: dateStr,
        fontSize: 10,
        color: COL_MUTED,
        alignment: 'center',
        margin: [0, 0, 0, 14]
      },
      { canvas: [{ type: 'line', x1: 0, y1: 0, x2: 515, y2: 0, lineWidth: 0.5, lineColor: '#E5E2D5' }] },

      // Week summary
      {
        margin: [0, 12, 0, 8],
        columns: [
          { stack: [
              { text: 'НЕДЕЛЯ · ИТОГО', fontSize: 9, bold: true, color: COL_HEAD, characterSpacing: 1 }
          ], width: 'auto' },
          { text: `${fmt(wt.k)} ккал  ·  Б ${fmt(wt.b)}  ·  Ж ${fmt(wt.zh)}  ·  У ${fmt(wt.u)}`, fontSize: 11, color: COL_BODY, alignment: 'right', width: '*' }
        ]
      },
      { canvas: [{ type: 'line', x1: 0, y1: 0, x2: 515, y2: 0, lineWidth: 0.5, lineColor: '#E5E2D5' }], margin: [0, 0, 0, 8] },

      // Days
      ...dayBlocks
    ]
  };
}

async function downloadPdf() {
  const anyData = days.some(d => hasDayItems(d) || drinksSummary(plan[d]._drinks || defaultDrinks()).length > 0);
  if (!anyData) {
    alert("План пока пустой — добавь хотя бы один продукт или отметь напиток.");
    return;
  }

  const btn = document.getElementById("downloadPdfBtn");
  const original = btn.textContent;
  btn.textContent = "Готовлю PDF...";
  btn.disabled = true;

  try {
    if (!window.jspdf || !window.jspdf.jsPDF) {
      throw new Error("Библиотека PDF не загрузилась");
    }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait', compress: true });

    // Register Roboto with Cyrillic
    doc.addFileToVFS('Roboto-Regular.ttf', window.__ROBOTO_400);
    doc.addFont('Roboto-Regular.ttf', 'Roboto', 'normal');
    doc.addFileToVFS('Roboto-Bold.ttf', window.__ROBOTO_700);
    doc.addFont('Roboto-Bold.ttf', 'Roboto', 'bold');
    doc.setFont('Roboto', 'normal');

    // Colors
    const C = {
      bg: [243, 242, 235],
      card: [255, 253, 249],
      text: [31, 38, 31],
      muted: [107, 114, 104],
      faint: [168, 172, 159],
      heading: [36, 74, 37],
      accent: [0, 157, 176],
      line: [229, 226, 213]
    };

    // Layout
    const PW = 210, PH = 297;
    const M = 12;
    const contentW = PW - 2 * M;
    let y = M;

    function paintBg() {
      doc.setFillColor(C.bg[0], C.bg[1], C.bg[2]);
      doc.rect(0, 0, PW, PH, 'F');
    }
    function ensure(h) {
      if (y + h > PH - M) {
        doc.addPage();
        paintBg();
        y = M;
      }
    }
    function card(x, py, w, h) {
      doc.setFillColor(C.card[0], C.card[1], C.card[2]);
      doc.setDrawColor(C.line[0], C.line[1], C.line[2]);
      doc.setLineWidth(0.2);
      doc.roundedRect(x, py, w, h, 2.5, 2.5, 'FD');
    }
    function setColor(rgb) { doc.setTextColor(rgb[0], rgb[1], rgb[2]); }

    paintBg();

    // ===== HEADER =====
    doc.setFont('Roboto', 'bold');
    doc.setFontSize(20);
    setColor(C.heading);
    doc.text('План питания на неделю', PW / 2, y + 7, { align: 'center' });
    y += 9;

    doc.setFont('Roboto', 'normal');
    doc.setFontSize(9);
    setColor(C.muted);
    const dateStr = new Date().toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
    doc.text(dateStr, PW / 2, y + 3, { align: 'center' });
    y += 6;

    doc.setDrawColor(C.line[0], C.line[1], C.line[2]);
    doc.setLineWidth(0.2);
    doc.line(M, y + 1, PW - M, y + 1);
    y += 5;

    // ===== WEEK TOTAL CARD =====
    const wt = weekTotal();
    const wcH = 22;
    card(M, y, contentW, wcH);
    doc.setFont('Roboto', 'bold');
    doc.setFontSize(7);
    setColor(C.heading);
    doc.text('НЕДЕЛЯ · ИТОГО', M + 5, y + 5);

    const cells = [['ккал', fmt(wt.k)], ['Белки', fmt(wt.b)], ['Жиры', fmt(wt.zh)], ['Углев', fmt(wt.u)]];
    const cellW = (contentW - 8) / 4;
    cells.forEach(([lbl, val], i) => {
      const cx = M + 4 + cellW * i + cellW / 2;
      doc.setFont('Roboto', 'normal');
      doc.setFontSize(7);
      setColor(C.muted);
      doc.text(lbl.toUpperCase(), cx, y + 12, { align: 'center' });
      doc.setFont('Roboto', 'bold');
      doc.setFontSize(13);
      setColor(C.heading);
      doc.text(String(val), cx, y + 18, { align: 'center' });
    });
    y += wcH + 3;

    // ===== DAY BLOCKS =====
    for (const d of days) {
      const dt = dayTotal(d);
      const has = hasDayItems(d);
      const drinks = plan[d]._drinks || defaultDrinks();
      const drinksLine = drinksSummary(drinks);

      // Pre-calculate height needed for this day's card
      const visibleMeals = meals.filter(m => plan[d][m] && plan[d][m].length > 0);
      let h = 9; // header bar
      visibleMeals.forEach(m => {
        const items = plan[d][m];
        const itemsText = items.map(it => `${it.name} — ${it.grams}г`).join('  ·  ');
        doc.setFont('Roboto', 'normal');
        doc.setFontSize(8.5);
        const lines = doc.splitTextToSize(itemsText, contentW - 10);
        h += 4.5; // meal header
        h += lines.length * 4 + 1;
      });
      if (drinksLine) {
        doc.setFont('Roboto', 'normal');
        doc.setFontSize(8.5);
        const dlines = doc.splitTextToSize(drinksLine, contentW - 10);
        h += 4.5 + dlines.length * 4 + 1;
      }
      if (!has && !drinksLine) h += 5;
      h += 3;

      // Page break if needed
      ensure(h);

      // Card
      card(M, y, contentW, h);

      // Day title row
      doc.setFont('Roboto', 'bold');
      doc.setFontSize(13);
      setColor(C.heading);
      doc.text(dayFull[d], M + 5, y + 7);
      if (has) {
        doc.setFont('Roboto', 'normal');
        doc.setFontSize(8);
        setColor(C.muted);
        doc.text(`${fmt(dt.k)} ккал`, M + contentW - 5, y + 7, { align: 'right' });
      }
      doc.setDrawColor(C.line[0], C.line[1], C.line[2]);
      doc.line(M + 4, y + 9, M + contentW - 4, y + 9);

      let rowY = y + 13;

      if (!has && !drinksLine) {
        doc.setFont('Roboto', 'normal');
        doc.setFontSize(8);
        setColor(C.faint);
        doc.text('не заполнено', M + 5, rowY);
        rowY += 4;
      } else {
        for (const m of visibleMeals) {
          const items = plan[d][m];
          const mt = mealTotal(d, m);

          doc.setFont('Roboto', 'bold');
          doc.setFontSize(7);
          setColor(C.heading);
          doc.text(
            `${m.toUpperCase()} · ${fmt(mt.k)} ккал · Б ${fmt(mt.b)} · Ж ${fmt(mt.zh)} · У ${fmt(mt.u)}`,
            M + 5, rowY
          );
          rowY += 4.5;

          doc.setFont('Roboto', 'normal');
          doc.setFontSize(8.5);
          setColor(C.text);
          const itemsText = items.map(it => `${it.name} — ${it.grams}г`).join('  ·  ');
          const lines = doc.splitTextToSize(itemsText, contentW - 10);
          doc.text(lines, M + 5, rowY);
          rowY += lines.length * 4 + 1;
        }

        if (drinksLine) {
          doc.setFont('Roboto', 'bold');
          doc.setFontSize(7);
          setColor(C.accent);
          doc.text('НАПИТКИ', M + 5, rowY);
          rowY += 4.5;

          doc.setFont('Roboto', 'normal');
          doc.setFontSize(8.5);
          setColor(C.text);
          const dlines = doc.splitTextToSize(drinksLine, contentW - 10);
          doc.text(dlines, M + 5, rowY);
          rowY += dlines.length * 4 + 1;
        }
      }

      y += h + 3;
    }

    doc.save('plan-pitaniya.pdf');
  } catch (e) {
    console.error("PDF error:", e);
    alert("Не получилось сделать PDF: " + (e && e.message ? e.message : "ошибка") + "\nПопробуй обновить страницу и повторить.");
  } finally {
    btn.textContent = original;
    btn.disabled = false;
  }
}

// ============== INIT ==============
document.querySelectorAll(".view-tab[data-view]").forEach(el => {
  el.addEventListener("click", () => switchView(el.dataset.view));
});
document.getElementById("resetBtn").addEventListener("click", () => {
  if (confirm("Очистить весь план на неделю?")) {
    plan = defaultPlan();
    savePlan();
    activeDay = "Пн"; activeMeal = "Завтрак";
    switchView("constructor");
  }
});
document.getElementById("dayResetBtn").addEventListener("click", () => {
  if (confirm(`Очистить план на ${dayFull[activeDay]}?`)) {
    meals.forEach(m => plan[activeDay][m] = []);
    plan[activeDay]._drinks = defaultDrinks();
    savePlan();
    renderConstructor();
  }
});
document.getElementById("downloadPdfBtn").addEventListener("click", downloadPdf);
document.getElementById("goToWeekBtn").addEventListener("click", () => switchView("week"));

renderConstructor();
</script>
